version: "3.8"
services:
  phil-text-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ../models:/app/models
      - ../configs:/app/configs
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    ports:
      - "5000:5000"
    volumes:
      - ../mlruns:/mlflow/mlruns
    command: mlflow server --host 0.0.0.0 --port 5000
    restart: unless-stopped
